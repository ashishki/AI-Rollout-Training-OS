name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Tests + Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt -e .
          else
            pip install pytest ruff pyyaml
          fi

      - name: Lint
        run: |
          if [ -d ai_rollout_os ] || [ -d tests ]; then
            ruff check ai_rollout_os tests
          else
            echo "Application package not created yet; T01 will enable lint scope."
          fi

      - name: Format check
        run: |
          if [ -d ai_rollout_os ] || [ -d tests ]; then
            ruff format --check ai_rollout_os tests
          else
            echo "Application package not created yet; T01 will enable format scope."
          fi

      - name: Run tests
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+psycopg://testuser:testpassword@localhost:5432/testdb
          SECRET_KEY: test-secret-key
          AI_PROVIDER_API_KEY: test-key
          MODEL_FAST: test-fast-model
          MODEL_STRONG: test-strong-model
          EMBEDDING_MODEL: test-embedding-model
          INDEX_MAX_AGE_DAYS: "7"
          FEEDBACK_TIMEOUT_SECONDS: "60"
          RETENTION_DAYS: "365"
        run: |
          if [ -d tests ]; then
            python -m pytest tests/ -q --tb=short
          else
            echo "No tests yet; T03 will establish the first baseline."
          fi

      - name: Retrieval evaluation
        if: hashFiles('tests/eval/test_retrieval_eval.py') != ''
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+psycopg://testuser:testpassword@localhost:5432/testdb
          SECRET_KEY: test-secret-key
          AI_PROVIDER_API_KEY: test-key
          MODEL_FAST: test-fast-model
          MODEL_STRONG: test-strong-model
          EMBEDDING_MODEL: test-embedding-model
        run: python -m pytest tests/eval/test_retrieval_eval.py -q --tb=short
