name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Tests + Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt -e .

      - name: Lint
        run: ruff check scripts ai_rollout_os tests migrations

      - name: Format check
        run: ruff format --check scripts ai_rollout_os tests migrations

      - name: Run tests
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+psycopg://testuser:testpassword@localhost:5432/testdb
          SECRET_KEY: test-secret-key
          AI_PROVIDER_API_KEY: test-key
          MODEL_FAST: test-fast-model
          MODEL_STRONG: test-strong-model
          EMBEDDING_MODEL: test-embedding-model
          INDEX_MAX_AGE_DAYS: "7"
          FEEDBACK_TIMEOUT_SECONDS: "60"
          RETENTION_DAYS: "365"
        run: python -m pytest tests/ -q --tb=short

      - name: Retrieval evaluation
        if: hashFiles('tests/eval/test_retrieval_eval.py') != ''
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+psycopg://testuser:testpassword@localhost:5432/testdb
          SECRET_KEY: test-secret-key
          AI_PROVIDER_API_KEY: test-key
          MODEL_FAST: test-fast-model
          MODEL_STRONG: test-strong-model
          EMBEDDING_MODEL: test-embedding-model
        run: python -m pytest tests/eval/test_retrieval_eval.py -q --tb=short

      - name: Retrieval eval script
        if: hashFiles('scripts/eval.py') != ''
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+psycopg://testuser:testpassword@localhost:5432/testdb
          SECRET_KEY: test-secret-key
          AI_PROVIDER_API_KEY: test-key
          MODEL_FAST: test-fast-model
          MODEL_STRONG: test-strong-model
          EMBEDDING_MODEL: test-embedding-model
        run: python scripts/eval.py --no-write
